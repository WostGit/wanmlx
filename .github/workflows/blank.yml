name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Targeted Download & Fix
        run: |
          mkdir -p wan_model
          
          # 1. Download only the config and the small VAE (total ~600MB)
          uvx hf download Wan-AI/Wan2.1-T2V-1.3B config.json Wan2.1_VAE.pth --local-dir ./wan_model
          
          # 2. Download the Transformer (This is the 5.6GB core)
          uvx hf download Wan-AI/Wan2.1-T2V-1.3B diffusion_pytorch_model.safetensors --local-dir ./wan_model
          
          # 3. FIX: Rename files to match what mlx-video's loader expects
          # mlx-video expects 'vae.safetensors' and 'transformer.safetensors' in some versions
          cd wan_model
          mv Wan2.1_VAE.pth vae.pth
          mv diffusion_pytorch_model.safetensors transformer.safetensors
          cd ..

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          # Identify the generator module
          GENERATOR_MODULE=$(python3 -c "import mlx_video; print('mlx_video.models.wan_2.generate')")

          echo "Starting 1-Step Generation (Safety Mode)..."
          
          # --t5-cpu is CRITICAL for your 7GB RAM limit. 
          # It keeps the heavy text encoder out of the GPU/Apple Silicon unified memory.
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "Red ball" \
            --width 256 \
            --height 256 \
            --num-frames 9 \
            --steps 1 \
            --t5-cpu \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4

      - name: Final Check
        if: always()
        run: ls -lh smoke_test.mp4 || echo "No video produced."
