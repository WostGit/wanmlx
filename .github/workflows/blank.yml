name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub hf_transfer
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Download Model Weights
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 1
        run: |
          echo "=== Downloading Official Wan2.1-1.3B Weights ==="
          mkdir -p wan_model
          
          # We target the official repo. Even if 4-bit isn't a separate repo, 
          # mlx-video will load these weights into memory efficiently.
          uvx hf download Wan-AI/Wan2.1-T2V-1.3B \
            --include "config.json" "*.safetensors" "*.txt" \
            --local-dir ./wan_model

          echo "=== Verification: Model Files ==="
          ls -R ./wan_model

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          # Identify the generator module dynamically
          GENERATOR_MODULE=$(python3 - <<'PY'
          import os, mlx_video, pkgutil
          pkg_path = os.path.dirname(mlx_video.__file__)
          found_mod = next((info.name for info in pkgutil.walk_packages([pkg_path], "mlx_video.") if "wan" in info.name and "generate" in info.name), "NOT_FOUND")
          print(found_mod)
          PY
          )

          if [ "$GENERATOR_MODULE" == "NOT_FOUND" ]; then
            echo "Error: MLX Generator module not found."
            exit 1
          fi

          echo "Detected Module: $GENERATOR_MODULE"
          echo "=== Starting 1-Step Generation (7GB RAM Guard) ==="
          
          # Using 1 step and 256px to ensure we don't swap to disk/OOM
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "A small green cube spinning" \
            --width 256 \
            --height 256 \
            --num-frames 9 \
            --steps 1 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Final Diagnostics
        if: always()
        run: |
          echo "=== Final Status ==="
          [ -f smoke_test.mp4 ] && ls -lh smoke_test.mp4 || echo "Generation failed."
          df -h
