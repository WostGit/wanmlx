name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub safetensors
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Download and Prepare Wan2.1-1.3B Models
        run: |
          python3 - <<'EOF'
          import os
          import shutil
          from huggingface_hub import hf_hub_download, list_repo_files

          repo = "Wan-AI/Wan2.1-T2V-1.3B"
          dest = "wan_model"
          os.makedirs(dest, exist_ok=True)

          print("Listing files in repo...")
          all_files = list_repo_files(repo)

          target_files = {}

          # Config
          config_cands = [f for f in all_files if f.endswith("config.json")]
          if config_cands:
              target_files["config.json"] = config_cands[0]

          # VAE
          vae_cands = [f for f in all_files if "vae" in f.lower()]
          if vae_cands:
              target_files["vae.pth"] = vae_cands[0]

          # Transformer
          trans_cands = [f for f in all_files if "diffusion_pytorch_model" in f or "transformer" in f.lower()]
          if trans_cands:
              target_files["transformer.safetensors"] = trans_cands[0]

          # T5 Encoder (the problematic one)
          t5_cands = [f for f in all_files if ("t5" in f.lower() or "umt5" in f.lower()) and f.endswith((".pth", ".safetensors"))]
          if t5_cands:
              # Prefer safetensors if available, otherwise the official .pth
              t5_file = next((f for f in t5_cands if f.endswith(".safetensors")), t5_cands[0])
              target_files["t5_source"] = t5_file
          else:
              raise ValueError("T5 encoder not found in the repository!")

          # Download files
          for local_name, remote_path in target_files.items():
              if local_name == "t5_source":
                  continue
              print(f"Downloading {remote_path} as {local_name}...")
              hf_hub_download(repo_id=repo, filename=remote_path, local_dir=dest, local_dir_use_symlinks=False)

          # Handle T5 specially (rename + possible conversion)
          t5_remote = target_files["t5_source"]
          print(f"Downloading T5 encoder: {t5_remote}")
          t5_downloaded = hf_hub_download(repo_id=repo, filename=t5_remote, local_dir=dest, local_dir_use_symlinks=False)

          t5_final = os.path.join(dest, "t5_encoder.safetensors")
          t5_pth = os.path.join(dest, "models_t5_umt5-xxl-enc-bf16.pth")

          if t5_remote.endswith(".pth"):
              shutil.move(t5_downloaded, t5_pth)
              print("T5 is .pth file → converting to safetensors...")
              import torch
              import safetensors.torch
              state_dict = torch.load(t5_pth, map_location="cpu", weights_only=True)
              safetensors.torch.save_file(state_dict, t5_final)
              print("Conversion completed successfully.")
          else:
              shutil.move(t5_downloaded, t5_final)
              print("T5 already in safetensors format.")

          print("\n=== Files in wan_model ===")
          for f in sorted(os.listdir(dest)):
              size_gb = os.path.getsize(os.path.join(dest, f)) / (1024**3)
              print(f"  {f:40} {size_gb:.2f} GB")
          EOF

      - name: Wan2.1-1.3B Ultra-Low RAM Smoke Test
        continue-on-error: true
        run: |
          echo "Starting Ultra-Low RAM Generation (128x128, 5 frames, 1 step)..."
          GENERATOR_MODULE="mlx_video.models.wan_2.generate"

          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "Red ball" \
            --width 128 \
            --height 128 \
            --num-frames 5 \
            --steps 1 \
            --output-path smoke_test.mp4 \
            --seed 7772016

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Diagnostics
        if: always()
        run: |
          echo "=== Final files in wan_model ==="
          ls -lh wan_model || true
          echo "=== smoke_test.mp4 exists? ==="
          ls -lh smoke_test.mp4 || echo "No video generated"
