name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Download Official Weights
        run: |
          echo "=== Downloading Official Wan-AI Weights ==="
          mkdir -p wan_model
          
          # Downloading only the essential files to save disk and ensure the path exists
          uvx hf download Wan-AI/Wan2.1-T2V-1.3B \
            --include "config.json" "diffusion_pytorch_model.safetensors" "Wan2.1_VAE.pth" "models_t5_umt5-xxl-enc-bf16.safetensors" \
            --local-dir ./wan_model

          # Standardize filenames for the mlx-video loader
          cd wan_model
          [ -f diffusion_pytorch_model.safetensors ] && mv diffusion_pytorch_model.safetensors transformer.safetensors
          [ -f models_t5_umt5-xxl-enc-bf16.safetensors ] && mv models_t5_umt5-xxl-enc-bf16.safetensors t5_encoder.safetensors
          [ -f Wan2.1_VAE.pth ] && mv Wan2.1_VAE.pth vae.pth
          cd ..

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          # Identify the generator module
          GENERATOR_MODULE=$(python3 -c "import mlx_video; print('mlx_video.models.wan_2.generate')")

          echo "Starting Ultra-Low RAM Generation..."
          
          # Using 128x128 resolution to guarantee success on 7GB RAM
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "Red ball" \
            --width 128 \
            --height 128 \
            --num-frames 5 \
            --steps 1 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Final Diagnostics
        if: always()
        run: |
          ls -R wan_model
          [ -f smoke_test.mp4 ] && echo "Success!" || echo "Failed to generate video."
