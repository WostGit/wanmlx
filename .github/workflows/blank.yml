name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          # Install core MLX and the specific repo
          # Using --system to ensure visibility across the runner environment
          uv pip install --system mlx torch
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: System Check
        run: |
          echo "=== Memory & Disk Status ==="
          sysctl hw.memsize
          vm_stat
          df -h

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          echo "=== Locating Wan Generator Module ==="
          
          # This script finds the correct module path even if the repo structure changes
          GENERATOR_MODULE=$(python3 - <<'PY'
          import os
          import mlx_video
          import pkgutil

          pkg_path = os.path.dirname(mlx_video.__file__)
          found_mod = None

          # Walk through all submodules to find one containing 'wan' and 'generate'
          for info in pkgutil.walk_packages([pkg_path], "mlx_video."):
              if "wan" in info.name and "generate" in info.name:
                  found_mod = info.name
                  break
          
          # Fallback: manual file search if walk_packages misses it
          if not found_mod:
              for root, _, files in os.walk(pkg_path):
                  if "generate.py" in files and "wan" in root.lower():
                      rel = os.path.relpath(os.path.join(root, "generate"), os.path.dirname(pkg_path))
                      found_mod = rel.replace(os.sep, ".")
                      break

          print(found_mod if found_mod else "NOT_FOUND")
          PY
          )

          if [ "$GENERATOR_MODULE" == "NOT_FOUND" ]; then
            echo "Error: Could not find any 'wan' generator module in mlx-video."
            echo "Listing all available modules for debugging:"
            python3 -c "import pkgutil, mlx_video; [print(m.name) for m in pkgutil.walk_packages(mlx_video.__path__, 'mlx_video.')]"
            exit 1
          fi

          echo "Detected Module: $GENERATOR_MODULE"
          echo "=== Starting 4-bit Generation (7GB RAM Limit) ==="
          
          # Run the discovered module
          python3 -m $GENERATOR_MODULE \
            --model-repo "mlx-community/Wan2.1-T2V-1.3B-4bit" \
            --prompt "A simple red ball bouncing" \
            --width 256 \
            --height 256 \
            --num-frames 9 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Final Diagnostics
        if: always()
        run: |
          echo "=== Final Status ==="
          [ -f smoke_test.mp4 ] && ls -lh smoke_test.mp4 || echo "Video generation failed or OOMed."
          df -h
