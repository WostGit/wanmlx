name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Robust Python Download
        run: |
          python3 - <<'EOF'
          import os, shutil
          from huggingface_hub import hf_hub_download, list_repo_files

          repo = "Wan-AI/Wan2.1-T2V-1.3B"
          dest = "wan_model"
          os.makedirs(dest, exist_ok=True)

          # Get all files in the repo to find the real T5 filename
          all_files = list_repo_files(repo)
          
          # Logic to find the correct files based on patterns
          target_files = {}
          
          # Find Config
          target_files["config.json"] = next(f for f in all_files if f.endswith("config.json"))
          # Find VAE
          target_files["vae.pth"] = next(f for f in all_files if "VAE" in f)
          # Find Transformer
          target_files["transformer.safetensors"] = next(f for f in all_files if "diffusion_pytorch_model" in f)
          # Find T5 Encoder (The tricky one)
          target_files["t5_encoder.safetensors"] = next(f for f in all_files if "t5" in f.lower() and f.endswith((".safetensors", ".pth")))

          for local_name, remote_path in target_files.items():
              print(f"Downloading {remote_path} as {local_name}...")
              downloaded_path = hf_hub_download(repo_id=repo, filename=remote_path, local_dir=dest)
              
              # Flatten the structure: Move to root of wan_model
              final_dest = os.path.join(dest, local_name)
              if os.path.abspath(downloaded_path) != os.path.abspath(final_dest):
                  shutil.move(downloaded_path, final_dest)

          print("Successfully prepared wan_model directory.")
          EOF

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          GENERATOR_MODULE="mlx_video.models.wan_2.generate"
          
          echo "Starting Ultra-Low RAM Generation..."
          # 128x128 resolution + 1 step = lowest possible memory footprint
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "Red ball" \
            --width 128 \
            --height 128 \
            --num-frames 5 \
            --steps 1 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Diagnostics
        if: always()
        run: |
          echo "=== Files in wan_model ==="
          ls -lh wan_model
