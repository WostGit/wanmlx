name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          # Install core MLX and the video engine
          uv pip install --system mlx torch
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Download Model Weights
        run: |
          echo "=== Downloading Complete 4-bit Wan2.1-1.3B Package ==="
          mkdir -p wan_model
          # Using a confirmed all-in-one MLX 4-bit repo
          uvx hf download dgrauet/Wan2.1-T2V-1.3B-v0.1-mlx-4bit --local-dir ./wan_model

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          echo "=== Locating Wan Generator Module ==="
          GENERATOR_MODULE=$(python3 - <<'PY'
          import os, mlx_video, pkgutil
          pkg_path = os.path.dirname(mlx_video.__file__)
          found_mod = next((info.name for info in pkgutil.walk_packages([pkg_path], "mlx_video.") if "wan" in info.name and "generate" in info.name), "NOT_FOUND")
          print(found_mod)
          PY
          )

          if [ "$GENERATOR_MODULE" == "NOT_FOUND" ]; then
            echo "Error: Generator not found."
            exit 1
          fi

          echo "Detected Module: $GENERATOR_MODULE"
          echo "=== Starting 4-bit Generation (7GB RAM Limit) ==="
          
          # Running with ultra-low steps and resolution to survive 7GB RAM
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "A simple red ball bouncing" \
            --width 256 \
            --height 256 \
            --num-frames 9 \
            --steps 3 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Final Diagnostics
        if: always()
        run: |
          echo "=== Final Status ==="
          [ -f smoke_test.mp4 ] && ls -lh smoke_test.mp4 || echo "Video generation failed."
          df -h
