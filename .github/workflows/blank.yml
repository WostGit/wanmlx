name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          # Install huggingface_hub specifically to get the CLI
          uv pip install --system mlx torch huggingface_hub
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Targeted Download and Rename
        run: |
          mkdir -p wan_model
          
          # We use python3 -m huggingface_hub.commands.cli to ensure the command is found
          # and use --local-dir-use-symlinks False to ensure real files are downloaded
          
          echo "Downloading Config..."
          python3 -m huggingface_hub.commands.cli download Wan-AI/Wan2.1-T2V-1.3B config.json --local-dir ./wan_model --local-dir-use-symlinks False
          
          echo "Downloading VAE..."
          python3 -m huggingface_hub.commands.cli download Wan-AI/Wan2.1-T2V-1.3B Wan2.1_VAE.pth --local-dir ./wan_model --local-dir-use-symlinks False
          
          echo "Downloading Transformer..."
          python3 -m huggingface_hub.commands.cli download Wan-AI/Wan2.1-T2V-1.3B diffusion_pytorch_model.safetensors --local-dir ./wan_model --local-dir-use-symlinks False
          
          echo "Downloading T5 Encoder..."
          # The official path is inside a models/ folder
          python3 -m huggingface_hub.commands.cli download Wan-AI/Wan2.1-T2V-1.3B models/t5_umt5-xxl-enc-bf16.safetensors --local-dir ./wan_model --local-dir-use-symlinks False

          # RENAME AND FLATTEN
          echo "Renaming files for MLX-Video..."
          mv ./wan_model/Wan2.1_VAE.pth ./wan_model/vae.pth || true
          mv ./wan_model/diffusion_pytorch_model.safetensors ./wan_model/transformer.safetensors || true
          
          # Handle the subfolder for T5
          if [ -f ./wan_model/models/t5_umt5-xxl-enc-bf16.safetensors ]; then
            mv ./wan_model/models/t5_umt5-xxl-enc-bf16.safetensors ./wan_model/t5_encoder.safetensors
          elif [ -f ./wan_model/t5_umt5-xxl-enc-bf16.safetensors ]; then
            mv ./wan_model/t5_umt5-xxl-enc-bf16.safetensors ./wan_model/t5_encoder.safetensors
          fi
          
          echo "=== Final Folder Structure ==="
          ls -R ./wan_model

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          GENERATOR_MODULE="mlx_video.models.wan_2.generate"
          
          echo "Starting Ultra-Low RAM Generation..."
          # Tiny resolution for the 7GB RAM limit
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "Red ball" \
            --width 128 \
            --height 128 \
            --num-frames 5 \
            --steps 1 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn
