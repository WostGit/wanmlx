name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub safetensors
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Download Lightweight Models (FP8 T5 + essentials)
        run: |
          python3 - <<'EOF'
          import os
          from huggingface_hub import hf_hub_download

          dest = "wan_model"
          os.makedirs(dest, exist_ok=True)

          print("=== Downloading lightweight models for ultra-low RAM test ===")

          # 1. FP8 T5 Encoder (~6.7 GB instead of 11.4 GB)
          print("Downloading FP8 T5 encoder...")
          hf_hub_download(
              repo_id="Kijai/WanVideo_comfy",
              filename="umt5-xxl-enc-fp8_e4m3fn.safetensors",
              local_dir=dest,
              local_dir_use_symlinks=False
          )
          os.rename(
              os.path.join(dest, "umt5-xxl-enc-fp8_e4m3fn.safetensors"),
              os.path.join(dest, "t5_encoder.safetensors")
          )

          # 2. VAE
          print("Downloading VAE...")
          hf_hub_download(
              repo_id="Wan-AI/Wan2.1-T2V-1.3B",
              filename="Wan2.1_VAE.pth",
              local_dir=dest,
              local_dir_use_symlinks=False
          )
          os.rename(
              os.path.join(dest, "Wan2.1_VAE.pth"),
              os.path.join(dest, "vae.pth")
          )

          # 3. Transformer (DiT) - small enough for smoke test
          print("Downloading Transformer...")
          hf_hub_download(
              repo_id="Wan-AI/Wan2.1-T2V-1.3B",
              filename="diffusion_pytorch_model.safetensors",
              local_dir=dest,
              local_dir_use_symlinks=False
          )
          os.rename(
              os.path.join(dest, "diffusion_pytorch_model.safetensors"),
              os.path.join(dest, "transformer.safetensors")
          )

          # 4. Config (if needed)
          print("Downloading config...")
          hf_hub_download(
              repo_id="Wan-AI/Wan2.1-T2V-1.3B",
              filename="config.json",
              local_dir=dest,
              local_dir_use_symlinks=False
          )

          print("\n=== Files downloaded ===")
          for f in sorted(os.listdir(dest)):
              size_gb = os.path.getsize(os.path.join(dest, f)) / (1024**3)
              print(f"  {f:45} {size_gb:.2f} GB")

          # Show free space
          print("\nFree disk space:")
          os.system("df -h .")
          EOF

      - name: Wan2.1-1.3B Ultra-Low RAM Smoke Test
        continue-on-error: true
        run: |
          echo "Starting Ultra-Low RAM Generation (128x128, 5 frames, 1 step)..."
          GENERATOR_MODULE="mlx_video.models.wan_2.generate"

          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "Red ball" \
            --width 128 \
            --height 128 \
            --num-frames 5 \
            --steps 1 \
            --output-path smoke_test.mp4 \
            --seed 7772016

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Diagnostics
        if: always()
        run: |
          echo "=== wan_model directory ==="
          ls -lh wan_model || true
          echo "=== Free space after run ==="
          df -h .
          echo "=== smoke_test.mp4 ==="
          ls -lh smoke_test.mp4 || echo "No video generated"
