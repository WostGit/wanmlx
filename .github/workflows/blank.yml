name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Forced Download and Rename
        run: |
          mkdir -p wan_model
          
          # 1. Download the required files explicitly. 
          # We use the official repo but pull specific files.
          echo "Downloading Config..."
          uvx hf download Wan-AI/Wan2.1-T2V-1.3B config.json --local-dir ./wan_model
          
          echo "Downloading VAE..."
          uvx hf download Wan-AI/Wan2.1-T2V-1.3B Wan2.1_VAE.pth --local-dir ./wan_model
          
          echo "Downloading Transformer..."
          uvx hf download Wan-AI/Wan2.1-T2V-1.3B diffusion_pytorch_model.safetensors --local-dir ./wan_model
          
          echo "Downloading T5 Encoder..."
          # Note: The official repo uses .safetensors for the encoder in newer versions
          uvx hf download Wan-AI/Wan2.1-T2V-1.3B models_t5_umt5-xxl-enc-bf16.safetensors --local-dir ./wan_model

          # 2. RENAME EVERYTHING to match what the library expects
          echo "Renaming files for MLX-Video..."
          mv ./wan_model/Wan2.1_VAE.pth ./wan_model/vae.pth
          mv ./wan_model/diffusion_pytorch_model.safetensors ./wan_model/transformer.safetensors
          mv ./wan_model/models_t5_umt5-xxl-enc-bf16.safetensors ./wan_model/t5_encoder.safetensors
          
          echo "=== Final Folder Structure ==="
          ls -lh ./wan_model

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          # Use the known module path
          GENERATOR_MODULE="mlx_video.models.wan_2.generate"

          echo "Starting Ultra-Low RAM Generation..."
          
          # Using tiny dimensions to stay within 7GB RAM
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "Red ball" \
            --width 128 \
            --height 128 \
            --num-frames 5 \
            --steps 1 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn
