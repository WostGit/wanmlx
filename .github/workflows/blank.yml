name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          # Install core MLX and the video engine
          uv pip install --system mlx torch huggingface_hub
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Download 4-bit Weights
        run: |
          echo "=== Downloading MLX-Community 4-bit Weights ==="
          mkdir -p wan_model
          
          # This repo contains the 4-bit T5 and 4-bit Transformer
          # Total size is ~1.2GB, which fits perfectly in 7GB RAM
          uvx hf download mlx-community/Wan2.1-T2V-1.3B-4bit --local-dir ./wan_model

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          # Identify the generator module
          GENERATOR_MODULE=$(python3 -c "import mlx_video, pkgutil, os; pkg_path = os.path.dirname(mlx_video.__file__); print(next((info.name for info in pkgutil.walk_packages([pkg_path], 'mlx_video.') if 'wan' in info.name and 'generate' in info.name), 'NOT_FOUND'))")

          if [ "$GENERATOR_MODULE" == "NOT_FOUND" ]; then
            echo "Error: Generator not found."
            exit 1
          fi

          echo "Detected Module: $GENERATOR_MODULE"
          echo "Starting 1-Step Generation..."
          
          # Using ONLY the flags supported by the help menu you provided
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "A simple red ball bouncing" \
            --width 256 \
            --height 256 \
            --num-frames 9 \
            --steps 1 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Final Status
        if: always()
        run: |
          ls -lh smoke_test.mp4 || echo "Video generation failed."
          df -h
