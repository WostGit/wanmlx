name: Test Ultra-Low Video MLX (Wan2.1-1.3B)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Python-Based Download and Flatten
        run: |
          python3 - <<'EOF'
          from huggingface_hub import hf_hub_download
          import os
          import shutil

          repo = "Wan-AI/Wan2.1-T2V-1.3B"
          dest = "wan_model"
          os.makedirs(dest, exist_ok=True)

          # Map of {Remote File Path: Local Filename the Generator Expects}
          files = {
              "config.json": "config.json",
              "Wan2.1_VAE.pth": "vae.pth",
              "diffusion_pytorch_model.safetensors": "transformer.safetensors",
              "models/t5_umt5-xxl-enc-bf16.safetensors": "t5_encoder.safetensors"
          }

          for remote, local in files.items():
              print(f"Downloading {remote} -> {local}...")
              path = hf_hub_download(
                  repo_id=repo, 
                  filename=remote, 
                  local_dir=dest, 
                  local_dir_use_symlinks=False
              )
              # If the file landed in a subfolder (like models/), move it to root
              final_path = os.path.join(dest, local)
              if path != final_path:
                  shutil.move(path, final_path)
          
          print("Download and flattening complete.")
          EOF

      - name: Wan2.1-1.3B Smoke Test
        continue-on-error: true
        run: |
          # Use the known module path for the Wan2.1 generator
          GENERATOR_MODULE="mlx_video.models.wan_2.generate"
          
          echo "Starting Ultra-Low RAM Generation..."
          # 128x128 resolution to survive the 7GB RAM limit
          python3 -m $GENERATOR_MODULE \
            --model-dir ./wan_model \
            --prompt "Red ball" \
            --width 128 \
            --height 128 \
            --num-frames 5 \
            --steps 1 \
            --output-path smoke_test.mp4

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4
          if-no-files-found: warn

      - name: Final Diagnostics
        if: always()
        run: |
          echo "=== Final Folder Structure ==="
          ls -R ./wan_model
          [ -f smoke_test.mp4 ] && echo "Video generated successfully." || echo "Video generation failed."
