name: Test Ultra-Low Video MLX (Wan2.1-1.3B) - Patched

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-video-low-ram:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system mlx torch huggingface_hub safetensors
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Download Lightweight Models
        run: |
          python3 - <<'EOF'
          import os
          from huggingface_hub import hf_hub_download

          dest = "wan_model"
          os.makedirs(dest, exist_ok=True)

          # 1. FP8 T5 Encoder
          hf_hub_download(repo_id="Kijai/WanVideo_comfy", filename="umt5-xxl-enc-fp8_e4m3fn.safetensors", local_dir=dest)
          os.rename(os.path.join(dest, "umt5-xxl-enc-fp8_e4m3fn.safetensors"), os.path.join(dest, "t5_encoder.safetensors"))

          # 2. VAE
          hf_hub_download(repo_id="Wan-AI/Wan2.1-T2V-1.3B", filename="Wan2.1_VAE.pth", local_dir=dest)
          os.rename(os.path.join(dest, "Wan2.1_VAE.pth"), os.path.join(dest, "vae.pth"))

          # 3. Transformer
          hf_hub_download(repo_id="Wan-AI/Wan2.1-T2V-1.3B", filename="diffusion_pytorch_model.safetensors", local_dir=dest)
          os.rename(os.path.join(dest, "diffusion_pytorch_model.safetensors"), os.path.join(dest, "transformer.safetensors"))

          # 4. Config
          hf_hub_download(repo_id="Wan-AI/Wan2.1-T2V-1.3B", filename="config.json", local_dir=dest)
          EOF

      - name: Run Patched Generation
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import os
          import mlx.core as mx
          from mlx_video.models.wan_2 import utils
          from mlx_video.models.wan_2.generate import generate_video
          from mlx_video.models.wan_2.utils import T5Encoder

          # PATCH: Override the loader to ignore unexpected FP8 gate parameters
          def patched_load_t5_encoder(t5_path, config):
              print("Applying FP8 Compatibility Patch...")
              model = T5Encoder(config.text_encoder)
              weights = mx.load(os.path.join(t5_path, "t5_encoder.safetensors"))
              # .update() ignores keys that don't match the model architecture
              model.update(weights)
              return model

          # Apply the patch to the utils module
          utils.load_t5_encoder = patched_load_t5_encoder

          # Execute generation
          generate_video(
              model_dir="./wan_model",
              prompt="Red ball",
              width=128,
              height=128,
              num_frames=5,
              steps=1,
              output_path="smoke_test.mp4",
              seed=7772016
          )
          EOF

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-video
          path: smoke_test.mp4

      - name: Diagnostics
        if: always()
        run: |
          ls -lh wan_model
          ls -lh smoke_test.mp4 || echo "Video file not found."
